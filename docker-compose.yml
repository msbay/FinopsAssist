# Local two-container test: frontend + backend, wired like production.
#   docker compose up --build      → UI at http://localhost:8501
# The token is shared by both services (the frontend sends it, the backend validates it).
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: finops-backend
    environment:
      FINOPS_API_TOKEN: ${FINOPS_API_TOKEN:-local-dev-token}
      LEARNING_STORE_PATH: /app/data/learning_store.csv
    env_file:
      - .env                      # Databricks/Azure SPN + AWS accounts API + Bedrock creds
    volumes:
      # the learning store (approved decisions) lives OUTSIDE the container — commits
      # persist to your host ./data dir across restarts
      - "./data:/app/data"
    ports:
      - "8000:8000"               # exposed for local debugging (/docs); keep internal in prod

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: finops-frontend
    environment:
      FINOPS_API_URL: http://backend:8000   # reach the backend by its compose service name
      FINOPS_API_TOKEN: ${FINOPS_API_TOKEN:-local-dev-token}
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
