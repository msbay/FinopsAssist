# Local two-container test: frontend + backend, wired like production.
#   docker compose up --build      → UI at http://localhost:8501
# The token is shared by both services (the frontend sends it, the backend validates it).
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: finops-backend
    environment:
      FINOPS_API_TOKEN: ${FINOPS_API_TOKEN:-local-dev-token}
    env_file:
      - .env                      # AWS/Bedrock creds for the LLM agent (train+predict works without)
    volumes:
      # the learning store lives OUTSIDE the container — commits persist to your host file
      - "./GO Report Extract GROUPED_V3.xlsx:/app/GO Report Extract GROUPED_V3.xlsx"
    ports:
      - "8000:8000"               # exposed for local debugging (/docs); keep internal in prod

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: finops-frontend
    environment:
      FINOPS_API_URL: http://backend:8000   # reach the backend by its compose service name
      FINOPS_API_TOKEN: ${FINOPS_API_TOKEN:-local-dev-token}
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
